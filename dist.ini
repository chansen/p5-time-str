name = Time-Str
abstract = Parse and format date/time strings in multiple standard formats
author = Christian Hansen <chansen@cpan.org>
license = Perl_5
copyright_holder = Christian Hansen
copyright_year = 2026

[VersionFromMainModule]
[CheckChangesHasContent]

[@Starter::Git]
revision = 6
-remove = MakeMaker
regenerate = Makefile.PL
regenerate = META.json
regenerate = LICENSE
regenerate = README
Pod2Readme.source_filename = lib/Time/Str.pod

[MakeMaker::Awesome]
test_file = t/*.t t/*/*.t
header = use Config;
header = my $xs_ok = 0;
header = if (eval { require ExtUtils::CBuilder; ExtUtils::CBuilder->new(quiet => 1)->have_compiler }) {
header =   my $cb = ExtUtils::CBuilder->new(quiet => 1);
header =   my $src = 'conftest.c';
header =   open my $fh, '>', $src or die "Cannot write $src: $!";
header =   print $fh "#if !defined(__STDC_VERSION__) || __STDC_VERSION__ < 199901L\n";
header =   print $fh "#error C99 required\n";
header =   print $fh "#endif\n";
header =   print $fh "int main(void){return 0;}\n";
header =   close $fh;
header =   eval {
header =     $cb->compile(source => $src, extra_compiler_flags => ['-std=c99']);
header =     $xs_ok = 1;
header =   };
header =   unlink $src, glob('conftest.*');
header = }
header = if ($xs_ok) {
header =   print "C99 compiler found, building XS.\n";
header = } else {
header =   print "No C99 compiler found, Pure-Perl only.\n";
header = }
WriteMakefile_arg = XS => ($xs_ok ? { 'XS.xs' => 'XS.c' } : {})
WriteMakefile_arg = C => ($xs_ok ? ['XS.c', 'tstr_time2str.c'] : [])
WriteMakefile_arg = OBJECT => ($xs_ok ? '$(O_FILES)' : '')
WriteMakefile_arg = INC => ($xs_ok ? '-I.' : '')
WriteMakefile_arg = CCFLAGS => ($xs_ok ? "$Config{ccflags} -std=c99" : $Config{ccflags})

[GithubMeta]
issues = 1
user = chansen
